  <text x="340" y="443" fill="#6b7280" font-size="10">6 ejer.</text>

  <rect x="40" y="459" width="330" height="32" rx="4" fill="#1e293b"/>
  <text x="55" y="480" fill="white" font-size="11">Día 3: Superior — Tracción</text>
  <text x="320" y="480" fill="#6b7280" font-size="10">6 ejer.</text>

  <rect x="40" y="496" width="330" height="32" rx="4" fill="#1e293b"/>
