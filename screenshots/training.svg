  <text x="660" y="162" fill="#9ca3af" font-size="11">Barra</text>
  <text x="440" y="182" fill="white" font-size="11">Dominadas</text>
  <text x="580" y="182" fill="#9ca3af" font-size="11">Espalda</text>
  <text x="660" y="182" fill="#9ca3af" font-size="11">Bodyweight</text>
