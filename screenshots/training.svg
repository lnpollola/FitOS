  <rect x="30" y="284" width="350" height="40" rx="6" fill="#1a1a2e" stroke="#2d2d4a" stroke-width="1"/>
  <text x="50" y="306" fill="#9ca3af" font-size="12">6x Full Body</text>

  <!-- Active plan detail -->
  <rect x="30" y="340" width="350" height="220" rx="6" fill="#1a1a2e"/>
