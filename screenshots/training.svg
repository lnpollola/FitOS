    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <text x="20" y="36" fill="white" font-size="18" font-weight="bold">Entrenamiento de Fuerza</text>

  <!-- Workout plans -->
  <rect x="20" y="55" width="370" height="530" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
