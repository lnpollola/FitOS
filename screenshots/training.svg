  <line x1="50" y1="375" x2="360" y2="375" stroke="#2d2d4a" stroke-width="1"/>

  <rect x="40" y="385" width="330" height="32" rx="4" fill="#1e293b"/>
  <text x="55" y="406" fill="white" font-size="11">Día 1: Superior — Empuje</text>
  <text x="320" y="406" fill="#6b7280" font-size="10">6 ejer.</text>

  <rect x="40" y="422" width="330" height="32" rx="4" fill="#1e293b"/>
