    <rect x="380" y="44" width="50" height="136" rx="3" fill="#4E5D3F" opacity="0.7"/>
    <rect x="452" y="32" width="50" height="148" rx="3" fill="#4E5D3F" opacity="0.7"/>
    <rect x="524" y="48" width="50" height="132" rx="3" fill="#4E5D3F" opacity="0.7"/>
