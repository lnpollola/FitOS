<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="700" fill="url(#bg)"/>
  <text x="20" y="36" fill="white" font-size="18" font-weight="bold">Planificación Adaptativa de Pérdida de Grasa</text>

  <!-- Target pace card -->
  <rect x="20" y="55" width="760" height="90" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
  <text x="40" y="80" fill="white" font-size="14" font-weight="600">Ritmo objetivo de pérdida</text>
  <text x="40" y="100" fill="#9ca3af" font-size="12">Ritmo:</text>
  <text x="90" y="100" fill="white" font-size="12" font-weight="bold">0.5 kg/semana</text>
  <!-- Range slider -->
  <rect x="200" y="93" width="500" height="6" rx="3" fill="#2d2d4a"/>
  <circle cx="370" cy="96" r="8" fill="#0D9488"/>
  <text x="720" y="100" fill="#6b7280" font-size="11">0.25 — 1.0</text>
  <rect x="40" y="108" width="150" height="28" rx="6" fill="#0D9488"/>
  <text x="115" y="127" text-anchor="middle" fill="white" font-size="12" font-weight="600">Calcular Déficit</text>

  <!-- Current status -->
  <rect x="20" y="160" width="370" height="180" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
  <text x="40" y="185" fill="white" font-size="14" font-weight="600">Estado Actual</text>
  <text x="40" y="210" fill="#9ca3af" font-size="12">Mantenimiento Estimado (GET):</text>
  <text x="200" y="210" fill="white" font-size="12" font-weight="bold">2,450 kcal</text>
  <text x="40" y="230" fill="#9ca3af" font-size="12">Ritmo objetivo:</text>
  <text x="160" y="230" fill="white" font-size="12" font-weight="bold">0.5 kg/semana</text>
  <text x="40" y="250" fill="#9ca3af" font-size="12">Déficit diario objetivo:</text>
  <text x="180" y="250" fill="#f59e0b" font-size="12" font-weight="bold">550 kcal</text>
  <text x="40" y="270" fill="#9ca3af" font-size="12">Ingesta diaria objetivo:</text>
  <text x="180" y="270" fill="white" font-size="12" font-weight="bold">1,900 kcal</text>
  <text x="40" y="290" fill="#9ca3af" font-size="12">Mínimo seguro:</text>
  <text x="140" y="290" fill="white" font-size="12">1,500 kcal</text>
  <text x="40" y="310" fill="#10b981" font-size="12" font-weight="bold">Seguro ✓</text>
  <line x1="40" y1="320" x2="370" y2="320" stroke="#2d2d4a" stroke-width="1"/>
  <text x="50" y="338" fill="#6b7280" font-size="11">TMB: 1,642 kcal | Deporte: 487 kcal | NEAT: 320 kcal</text>

  <!-- Adherence card -->
  <rect x="410" y="160" width="370" height="180" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
  <text x="430" y="185" fill="white" font-size="14" font-weight="600">Evaluación de Adherencia</text>
  <text x="430" y="210" fill="#9ca3af" font-size="12">Peso de Tendencia:</text>
  <text x="560" y="210" fill="white" font-size="12" font-weight="bold">78.5 kg</text>
  <text x="430" y="230" fill="#9ca3af" font-size="12">Ritmo de pérdida real:</text>
  <text x="580" y="230" fill="white" font-size="12" font-weight="bold">0.48 kg/sem</text>
  <!-- Gauge -->
  <rect x="430" y="245" width="330" height="20" rx="10" fill="#1a1a2e"/>
  <rect x="430" y="245" width="290" height="20" rx="10" fill="#0D9488"/>
  <text x="595" y="259" text-anchor="middle" fill="white" font-size="10" font-weight="bold">96%</text>
  <text x="430" y="278" fill="#6b7280" font-size="11">Consistencia:</text>
  <text x="510" y="278" fill="white" font-size="14" font-weight="bold">83%</text>
  <text x="550" y="278" fill="#6b7280" font-size="11">5 semanas en camino</text>
  <!-- Recommendation -->
  <rect x="430" y="290" width="330" height="30" rx="6" fill="#1a1a2e" stroke="#2d2d4a" stroke-width="1"/>
  <text x="445" y="310" fill="#10b981" font-size="11">✓ En camino — Mantener ritmo actual</text>

  <!-- Recomp detection card -->
  <rect x="20" y="355" width="370" height="180" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
  <text x="40" y="380" fill="white" font-size="14" font-weight="600">Detección de Recomposición</text>
  <text x="40" y="405" fill="#9ca3af" font-size="12">Período:</text>
  <text x="100" y="405" fill="white" font-size="12">01/05 → 01/06 (4 mediciones)</text>
  <text x="40" y="425" fill="#9ca3af" font-size="12">Cambio de peso:</text>
  <text x="140" y="425" fill="white" font-size="12">+0.3 kg (estable ✓)</text>
  <text x="40" y="445" fill="#9ca3af" font-size="12">Cambio de cintura:</text>
  <text x="150" y="445" fill="#10b981" font-size="12">-2.3 cm (disminuyendo ✓)</text>
  <text x="40" y="470" fill="#10b981" font-size="14" font-weight="bold">Recomposición detectada ✓</text>
  <!-- Mini chart -->
  <rect x="220" y="395" width="150" height="120" rx="4" fill="#1a1a2e"/>
  <polyline points="230,480 260,470 290,475 320,465 350,460" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <polyline points="230,475 260,465 290,450 320,440 350,435" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="510" fill="#ef4444" font-size="9">peso</text>
  <text x="300" y="510" fill="#3b82f6" font-size="9">cintura</text>

  <!-- Deficit impact card -->
  <rect x="410" y="355" width="370" height="180" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
  <text x="430" y="380" fill="white" font-size="14" font-weight="600">Impacto vs Base PDF</text>
  <text x="430" y="405" fill="#9ca3af" font-size="12">Base PDF:</text>
  <text x="510" y="405" fill="white" font-size="12" font-weight="bold">2,100 kcal</text>
  <text x="430" y="425" fill="#9ca3af" font-size="12">Tu dieta actual (hoy):</text>
  <text x="600" y="425" fill="white" font-size="12" font-weight="bold">1,900 kcal</text>
  <text x="430" y="450" fill="#9ca3af" font-size="12">Diferencia:</text>
  <text x="520" y="450" fill="#10b981" font-size="14" font-weight="bold">-200 kcal (-10%)</text>
  <rect x="430" y="465" width="330" height="12" rx="6" fill="#1a1a2e"/>
  <rect x="430" y="465" width="65" height="12" rx="6" fill="#10b981"/>

  <!-- Adjustments card -->
  <rect x="20" y="550" width="370" height="135" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
  <text x="40" y="575" fill="white" font-size="14" font-weight="600">Recomendaciones de Ajuste</text>
  <text x="40" y="600" fill="#9ca3af" font-size="12">Déficit diario actual:</text>
  <text x="170" y="600" fill="white" font-size="12">530 kcal</text>
  <text x="40" y="620" fill="#9ca3af" font-size="12">Déficit diario objetivo:</text>
  <text x="185" y="620" fill="white" font-size="12">550 kcal</text>
  <text x="40" y="640" fill="#9ca3af" font-size="12">Ajuste necesario:</text>
  <text x="165" y="640" fill="#f59e0b" font-size="12">+20 kcal</text>
  <rect x="40" y="655" width="130" height="24" rx="6" fill="#0D9488"/>
  <text x="105" y="672" text-anchor="middle" fill="white" font-size="11" font-weight="600">Aplicar</text>

  <!-- History card -->
  <rect x="410" y="550" width="370" height="135" rx="8" fill="#1e293b" stroke="#2d2d4a" stroke-width="1"/>
  <text x="430" y="575" fill="white" font-size="14" font-weight="600">Historial de Ajustes</text>
  <rect x="430" y="588" width="330" height="20" rx="4" fill="#1a1a2e"/>
  <text x="440" y="602" fill="#6b7280" font-size="10">Fecha</text>
  <text x="500" y="602" fill="#6b7280" font-size="10">Ritmo</text>
  <text x="560" y="602" fill="#6b7280" font-size="10">Déf. Objetivo</text>
  <text x="650" y="602" fill="#6b7280" font-size="10">Brecha</text>
  <line x1="430" y1="610" x2="760" y2="610" stroke="#2d2d4a" stroke-width="1"/>
  <text x="440" y="630" fill="white" font-size="11">15/06</text>
  <text x="500" y="630" fill="white" font-size="11">0.5</text>
  <text x="570" y="630" fill="white" font-size="11">550 kcal</text>
  <text x="660" y="630" fill="#10b981" font-size="11">+20 kcal</text>
</svg>