  <g transform="translate(280, 470)">
    <line x1="0" y1="0" x2="0" y2="180" stroke="#D8D2C4" stroke-width="1"/>
    <line x1="0" y1="180" x2="950" y2="180" stroke="#D8D2C4" stroke-width="1"/>
    <line x1="0" y1="50" x2="950" y2="50" stroke="#E6E0D2" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="0" y1="100" x2="950" y2="100" stroke="#E6E0D2" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="0" y1="150" x2="950" y2="150" stroke="#E6E0D2" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- Target line: −400 -->
    <line x1="0" y1="40" x2="950" y2="40" stroke="#C75B3B" stroke-width="1.4" stroke-dasharray="6 4"/>
    <text x="956" y="44" font-family="'Source Sans 3', sans-serif" font-size="10" font-weight="600" fill="#C75B3B">−400</text>

