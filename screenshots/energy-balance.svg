<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="'Source Sans 3', 'Inter', sans-serif">
  <defs>
    <pattern id="grain" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <rect width="160" height="160" fill="#F4EFE6"/>
      <rect width="160" height="160" filter="url(#n)" opacity="0.04"/>
    </pattern>
    <filter id="n">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.09  1 0"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="#F4EFE6"/>
  <rect width="1280" height="800" fill="url(#grain)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="800" fill="#FBF7EE"/>
  <line x1="220" y1="0" x2="220" y2="800" stroke="#D8D2C4" stroke-width="1"/>
  <text x="24" y="40" font-family="'Fraunces', Georgia, serif" font-size="22" font-weight="600" fill="#2F3D26" letter-spacing="-0.5">FitOS</text>
  <text x="24" y="58" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#8A8870">Leandro Pollola</text>

  <text x="24" y="100" font-family="'Fraunces', serif" font-style="italic" font-size="10" fill="#8A8870" letter-spacing="1">INICIO  ▾</text>
  <text x="36" y="129" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Panel</text>
  <text x="36" y="160" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Tendencias</text>

  <text x="24" y="200" font-family="'Fraunces', serif" font-style="italic" font-size="10" fill="#8A8870" letter-spacing="1">SALUD  ▾</text>
  <text x="36" y="226" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Actividad</text>
  <text x="36" y="252" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Sueño</text>
  <rect x="14" y="260" width="192" height="34" rx="8" fill="#D7DAC7"/>
  <rect x="14" y="260" width="3" height="34" rx="1.5" fill="#4E5D3F"/>
  <path d="M 36 282 L 30 274 L 32 282 L 30 284" stroke="#2F3D26" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="52" y="281" font-family="'Source Sans 3', sans-serif" font-size="13" font-weight="500" fill="#2F3D26">Balance Energético</text>

  <text x="24" y="330" font-family="'Fraunces', serif" font-style="italic" font-size="10" fill="#8A8870" letter-spacing="1">ENTRENAMIENTO  ▾</text>
  <text x="36" y="356" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Plan de Dieta</text>
  <text x="36" y="382" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Mediciones</text>
  <text x="36" y="408" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Entrenamiento</text>

  <line x1="24" y1="700" x2="196" y2="700" stroke="#D8D2C4" stroke-width="1"/>
  <text x="36" y="724" font-family="'Source Sans 3', sans-serif" font-size="13" fill="#8A8870">Perfil y Ajustes</text>

  <!-- Main content -->
  <text x="250" y="48" font-family="'Fraunces', Georgia, serif" font-size="28" font-weight="600" fill="#2F3D26" letter-spacing="-0.6">Balance Energético</text>
  <text x="250" y="68" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#8A8870">Ritmo objetivo: −400 kcal/día · déficit conservador</text>

  <g transform="translate(1130, 36)">
    <rect x="0" y="0" width="120" height="32" rx="8" fill="#FBF7EE" stroke="#D8D2C4"/>
    <text x="60" y="20" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="12" fill="#2F3D26">Última semana ▾</text>
  </g>

  <!-- TDEE breakdown card -->
  <rect x="250" y="90" width="380" height="320" rx="14" fill="#FBF7EE" stroke="#D8D2C4"/>
  <text x="270" y="118" font-family="'Fraunces', serif" font-style="italic" font-size="13" fill="#4E5D3F">Desglose del GET (gasto total)</text>

  <!-- Stacked bar -->
  <g transform="translate(270, 144)">
    <rect x="0" y="0" width="340" height="44" rx="6" fill="#F4EFE6"/>
    <!-- TMB: 1.642 (64%) -->
    <rect x="0" y="0" width="218" height="44" rx="6" fill="#4E5D3F"/>
    <!-- Sport: 487 (19%) -->
    <rect x="218" y="0" width="65" height="44" fill="#C75B3B"/>
    <!-- NEAT: 423 (17%) -->
    <rect x="283" y="0" width="57" height="44" rx="6" fill="#8A8870"/>
  </g>

  <g transform="translate(270, 200)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#4E5D3F"/>
    <text x="20" y="10" font-family="'Source Sans 3', sans-serif" font-size="12" font-weight="600" fill="#2F3D26">TMB</text>
    <text x="60" y="10" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#8A8870">Mifflin-St Jeor</text>
    <text x="340" y="10" text-anchor="end" font-family="'Fraunces', Georgia, serif" font-size="18" font-weight="600" fill="#2F3D26">1.642 kcal</text>
    <text x="340" y="26" text-anchor="end" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#8A8870">64% del total</text>
  </g>

  <g transform="translate(270, 250)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#C75B3B"/>
    <text x="20" y="10" font-family="'Source Sans 3', sans-serif" font-size="12" font-weight="600" fill="#2F3D26">Deporte</text>
    <text x="80" y="10" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#8A8870">5.2 sesiones/sem</text>
    <text x="340" y="10" text-anchor="end" font-family="'Fraunces', Georgia, serif" font-size="18" font-weight="600" fill="#2F3D26">487 kcal</text>
    <text x="340" y="26" text-anchor="end" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#8A8870">19% del total</text>
  </g>

  <g transform="translate(270, 300)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#8A8870"/>
    <text x="20" y="10" font-family="'Source Sans 3', sans-serif" font-size="12" font-weight="600" fill="#2F3D26">NEAT</text>
    <text x="58" y="10" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#8A8870">8.542 pasos/día</text>
    <text x="340" y="10" text-anchor="end" font-family="'Fraunces', Georgia, serif" font-size="18" font-weight="600" fill="#2F3D26">423 kcal</text>
    <text x="340" y="26" text-anchor="end" font-family="'Source Sans 3', sans-serif" font-size="10" fill="#8A8870">17% del total</text>
  </g>

  <line x1="270" y1="346" x2="610" y2="346" stroke="#E6E0D2"/>
  <text x="270" y="376" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#8A8870">GET total</text>
  <text x="610" y="376" text-anchor="end" font-family="'Fraunces', Georgia, serif" font-size="22" font-weight="600" fill="#4E5D3F">2.552 kcal/día</text>
  <text x="270" y="396" font-family="'Fraunces', serif" font-style="italic" font-size="11" fill="#8A8870">calculado desde datos reales de Apple Watch</text>

  <!-- Adherence gauge card -->
  <rect x="650" y="90" width="280" height="320" rx="14" fill="#FBF7EE" stroke="#D8D2C4"/>
