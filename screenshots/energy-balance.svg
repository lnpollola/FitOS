    <text x="117" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">16</text>
    <text x="189" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">17</text>
    <text x="261" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">18</text>
    <text x="333" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">19</text>
    <text x="405" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">20</text>
    <text x="477" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">21</text>
    <text x="549" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">22</text>
    <text x="621" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">23</text>
    <text x="693" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">24</text>
    <text x="765" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">25</text>
    <text x="837" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">26</text>
    <text x="909" y="200" text-anchor="middle" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">27</text>

    <!-- Y axis labels -->
    <text x="-6" y="3" text-anchor="end" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">0</text>
    <text x="-6" y="53" text-anchor="end" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">−200</text>
    <text x="-6" y="103" text-anchor="end" font-family="'Source Sans 3', sans-serif" font-size="9" fill="#8A8870">−400</text>
