    <text x="240" y="14" text-anchor="end" font-family="'Fraunces', Georgia, serif" font-size="14" font-weight="600" fill="#2F3D26">2.118 kcal</text>
  </g>
  <g transform="translate(670, 340)">
    <text x="0" y="14" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#8A8870">Objetivo</text>
    <text x="240" y="14" text-anchor="end" font-family="'Fraunces', Georgia, serif" font-size="14" font-weight="600" fill="#2F3D26">2.120 kcal</text>
  </g>
  <g transform="translate(670, 368)">
    <text x="0" y="14" font-family="'Source Sans 3', sans-serif" font-size="11" fill="#8A8870">Déficit realizado</text>
