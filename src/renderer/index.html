<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Pollo</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1>Personal Pollo</h1>
      </div>
      <ul class="nav-list">
        <li data-view="dashboard" class="active">Dashboard</li>
        <li data-view="activity">Activity</li>
        <li data-view="diet">Diet Plan</li>
        <li data-view="energy">Energy Balance</li>
        <li data-view="measurements">Body Measurements</li>
        <li data-view="training">Strength Training</li>
        <li data-view="profile">Profile &amp; Settings</li>
      </ul>
    </nav>
    <main id="content">
      <div id="view-dashboard" class="view active-view"></div>
      <div id="view-activity" class="view"></div>
      <div id="view-diet" class="view"></div>
      <div id="view-energy" class="view"></div>
      <div id="view-measurements" class="view"></div>
      <div id="view-training" class="view"></div>
      <div id="view-profile" class="view"></div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
