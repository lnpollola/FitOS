<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles/main.css" />
  <script type="module">
    import { strings } from './locales/es.js';
    document.title = strings.appTitle;
    document.querySelector('.sidebar-header h1').textContent = strings.appTitle;
    document.querySelectorAll('.nav-list li').forEach(li => {
      const view = li.dataset.view;
      if (strings.nav[view]) li.textContent = strings.nav[view];
    });
  </script>
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1>FitOS</h1>
        <div class="sidebar-subtitle">Salud y rendimiento</div>
      </div>
      <ul class="nav-list">
        <li data-view="dashboard" class="active">Panel</li>
        <li data-view="activity">Actividad</li>
        <li data-view="diet">Plan de Dieta</li>
        <li data-view="energy">Balance Energético</li>
        <li data-view="measurements">Mediciones Corporales</li>
        <li data-view="training">Entrenamiento de Fuerza</li>
        <li data-view="profile">Perfil y Ajustes</li>
      </ul>
    </nav>
    <main id="content">
      <div id="view-dashboard" class="view active-view"></div>
      <div id="view-activity" class="view"></div>
      <div id="view-diet" class="view"></div>
      <div id="view-energy" class="view"></div>
      <div id="view-measurements" class="view"></div>
      <div id="view-training" class="view"></div>
      <div id="view-profile" class="view"></div>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
